name: CI

permissions:
  contents: read

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
  workflow_call:

jobs:
  build:
    name: Code standards & build
    runs-on: ubuntu-latest
    timeout-minutes: 3

    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: "📦 Install pnpm"
        uses: pnpm/action-setup@a3252b7c7d56101a7d640e3354e5c468f91fed68 # v3.0.0
        with:
          version: 10.11.1

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: "📦 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "🔎 Lint code"
        run: pnpm run lint

      - name: "📝 Checking code format"
        run: pnpm run format:check

      - name: "🧪 Run sync tests"
        run: pnpm run test:sync

      - name: Assert minimum test count
        run: |
          COUNT=$(node --test 'scripts/__tests__/*.test.mjs' 2>&1 | grep -c '^ok \|^not ok ' || true)
          echo "Tests found: $COUNT"
          [ "$COUNT" -ge 80 ] || { echo "ERROR: only $COUNT tests found, expected >= 80"; exit 1; }

      - name: "🚀 Build the project"
        run: pnpm run build
