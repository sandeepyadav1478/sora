name: Sync from upstream template

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run in forks, not in the template repo itself
    if: github.repository != 'sandeepyadav1478/sora'
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/sandeepyadav1478/sora.git || true

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Merge upstream changes
        run: |
          git merge upstream/main --no-edit --allow-unrelated-histories || {
            echo "::warning::Merge conflict detected. Creating a PR instead."
            git merge --abort
            git checkout -b sync/upstream-$GITHUB_RUN_ID
            git merge upstream/main --no-edit --allow-unrelated-histories || true
            git diff --check || { echo "::error::Unresolved conflicts after retry — manual fix required"; exit 1; }
            git add -A
            git commit -m "chore: sync upstream template (conflicts)" --allow-empty
            echo "CONFLICT=true" >> $GITHUB_ENV
            echo "CONFLICT_BRANCH=sync/upstream-$GITHUB_RUN_ID" >> $GITHUB_ENV
            git push origin sync/upstream-$GITHUB_RUN_ID
          }

      - name: Open PR for conflict branch
        if: env.CONFLICT == 'true'
        env:
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          curl -s -o /dev/null \
            -X POST \
            -H "Authorization: Bearer $GH_API_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GH_REPO}/pulls" \
            -d "{\"title\":\"chore: sync upstream template (conflicts)\",\"head\":\"${CONFLICT_BRANCH}\",\"base\":\"main\",\"body\":\"Upstream sync produced merge conflicts. Please resolve and merge this PR.\"}"

      - name: Push merged changes
        if: env.CONFLICT != 'true'
        run: git push origin main
