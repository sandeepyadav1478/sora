name: Sync content sources

on:
  schedule:
    - cron: "0 2 * * *" # Daily at 2am UTC
  workflow_dispatch: # Manual trigger from the Actions UI

permissions:
  contents: write # push updated cache to main
  issues: write # open / update / close the failure issue

concurrency:
  group: sync-sources
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run sync
        continue-on-error: true
        run: node scripts/sync-sources.mjs --report
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GITHUB_READ_TOKEN: ${{ secrets.GITHUB_READ_TOKEN }}

      - name: Write fallback report on sync crash
        if: always()
        run: |
          if [ ! -f sync-report.json ]; then
            echo '{"generatedAt":"'"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"'","failures":[{"source":"sync-script","error":"Fatal crash — see Actions log for details"}],"successes":[]}' > sync-report.json
          fi

      - name: Commit updated cache
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet src/data/sources-cache.json; then
            echo "Cache unchanged — skipping commit"
          else
            git add src/data/sources-cache.json
            git commit -m "chore(sync): update sources cache"
            git push
          fi

      - name: Process sync report
        id: report
        if: always()
        continue-on-error: true
        run: node scripts/process-report.mjs
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GITHUB_READ_TOKEN: ${{ secrets.GITHUB_READ_TOKEN }}

      - name: Write fallback issue body if process-report crashed
        id: fallback_report
        if: always()
        run: |
          if [ ! -f /tmp/issue_body.md ]; then
            printf '## Sync failures\n\n_Report processing failed — check the Actions log._\n' > /tmp/issue_body.md
            echo "failure_count=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Check git archives
        if: always()
        run: node scripts/check-archives.mjs

      - name: Open unarchive candidate issues
        if: always()
        env:
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          COUNT=$(python3 -c "import json; print(len(json.load(open('archive-alerts.json'))))" 2>/dev/null || echo "0")
          if [ "$COUNT" -eq 0 ]; then
            echo "No unarchive candidates."
            exit 0
          fi
          python3 <<'PYEOF'
import json, os
import urllib.request, urllib.parse

alerts = json.load(open("archive-alerts.json"))
token = os.environ["GH_API_TOKEN"]
repo  = os.environ["GH_REPO"]
api   = f"https://api.github.com/repos/{repo}"
hdrs  = {
    "Authorization": f"Bearer {token}",
    "Accept": "application/vnd.github+json",
    "Content-Type": "application/json",
}

def api_call(method, path, body=None):
    data = json.dumps(body).encode() if body else None
    req = urllib.request.Request(f"{api}{path}", data=data, headers=hdrs, method=method)
    try:
        with urllib.request.urlopen(req, timeout=30) as r:
            return json.loads(r.read())
    except Exception as e:
        print(f"API error {method} {path}: {e}")
        return {}

# Ensure label exists (201=created, 422=exists — both ok)
api_call("POST", "/labels", {
    "name": "unarchive-candidate",
    "color": "0075ca",
    "description": "Repo has recent activity but is marked archived",
})

for alert in alerts:
    title = f"[Sora] Unarchive candidate: {alert['githubRepo']}"
    # Search for existing open issue
    q = urllib.parse.quote(title)
    search = f"https://api.github.com/search/issues?q={q}+in:title+repo:{repo}+state:open&per_page=1"
    req = urllib.request.Request(search, headers=hdrs)
    try:
        with urllib.request.urlopen(req, timeout=30) as r:
            results = json.loads(r.read())
        if results.get("total_count", 0) > 0:
            print(f"Issue already open for {alert['githubRepo']} — skipping")
            continue
    except Exception as e:
        print(f"Search error: {e}")
        continue  # skip issue creation if dedup check failed

    body = (
        "## Unarchive candidate\n\n"
        f"**Work entry:** {alert['title']}\n"
        f"**Repo:** {alert['githubRepo']}\n\n"
        "This repo appears in your recent GitHub activity feed but is marked `status: archived` in your works.\n\n"
        "**To promote it back to active:**\n"
        "1. Open `src/data/works/<entry>.md`\n"
        "2. Change `status: archived` to `status: active` (or `maintained` / `in-production`)\n"
        "3. Update `modDatetime` to today\n\n"
        "_This issue will not reopen once you close it unless new activity is detected in a future sync._\n"
    )
    api_call("POST", "/issues", {
        "title": title,
        "body": body,
        "labels": ["unarchive-candidate"],
    })
    print(f"Opened issue for {alert['githubRepo']}")
PYEOF

      - name: Ensure sync-failure label exists
        if: always() && (steps.report.outputs.failure_count != '0' || steps.fallback_report.outputs.failure_count != '')
        env:
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -o /dev/null \
            -X POST \
            -H "Authorization: Bearer $GH_API_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/labels" \
            -d '{"name":"sync-failure","color":"d73a4a","description":"Automatic sync failure notification"}' \
            || true
          # 201 = created, 422 = already exists — both acceptable

      - name: Open or update failure issue
        if: always() && (steps.report.outputs.failure_count != '0' || steps.fallback_report.outputs.failure_count != '')
        env:
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          ISSUE_TITLE="%5BSora%5D+Sync+failures"
          EXISTING=$(curl -sf \
            -H "Authorization: Bearer $GH_API_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/search/issues?q=${ISSUE_TITLE}+in:title+repo:${GH_REPO}+state:open&per_page=1" \
            | python3 -c "import sys,json; items=json.load(sys.stdin).get('items',[]); print(items[0]['number'] if items else '')")
          BODY=$(cat /tmp/issue_body.md)
          BODY_JSON=$(echo "$BODY" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          if [ -z "$EXISTING" ]; then
            curl -sf -o /dev/null \
              -X POST \
              -H "Authorization: Bearer $GH_API_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GH_REPO}/issues" \
              -d "{\"title\":\"[Sora] Sync failures\",\"body\":${BODY_JSON},\"labels\":[\"sync-failure\"]}"
          else
            curl -sf -o /dev/null \
              -X PATCH \
              -H "Authorization: Bearer $GH_API_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GH_REPO}/issues/${EXISTING}" \
              -d "{\"body\":${BODY_JSON}}"
          fi

      - name: Close failure issue on clean sync
        if: always() && steps.report.outputs.failure_count == '0' && steps.fallback_report.outputs.failure_count == ''
        env:
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          ISSUE_TITLE="%5BSora%5D+Sync+failures"
          EXISTING=$(curl -sf \
            -H "Authorization: Bearer $GH_API_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/search/issues?q=${ISSUE_TITLE}+in:title+repo:${GH_REPO}+state:open&per_page=1" \
            | python3 -c "import sys,json; items=json.load(sys.stdin).get('items',[]); print(items[0]['number'] if items else '')")
          if [ -n "$EXISTING" ]; then
            curl -sf -o /dev/null \
              -X PATCH \
              -H "Authorization: Bearer $GH_API_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GH_REPO}/issues/${EXISTING}" \
              -d '{"state":"closed"}'
            curl -sf -o /dev/null \
              -X POST \
              -H "Authorization: Bearer $GH_API_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GH_REPO}/issues/${EXISTING}/comments" \
              -d '{"body":"All sources synced successfully. Closing."}'
          fi
